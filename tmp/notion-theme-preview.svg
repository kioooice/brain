  <rect x="1318" y="796" width="92" height="34" rx="17" fill="#F2F9FF"/>
  <text x="1344" y="818" fill="#097FE8" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Image</text>
  <rect x="1418" y="796" width="84" height="34" rx="17" fill="#F6F5F4"/>
  <text x="1448" y="818" fill="#615D59" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Link</text>
  <text x="1318" y="870" fill="#615D59" font-family="Segoe UI, Arial, sans-serif" font-size="15">Warm, content-first, and calmer</text>
  <text x="1318" y="896" fill="#615D59" font-family="Segoe UI, Arial, sans-serif" font-size="15">than a tool-like Raycast style.</text>
