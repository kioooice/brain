  <text x="688" y="532" fill="#1F1B18" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Website bundle</text>
  <text x="688" y="562" fill="#615D59" font-family="Segoe UI, Arial, sans-serif" font-size="15">6 pages grouped together for easy scan.</text>
  <text x="688" y="833" fill="#1F1B18" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Typography samples</text>
  <text x="688" y="863" fill="#615D59" font-family="Segoe UI, Arial, sans-serif" font-size="15">Warm neutrals with one blue active accent.</text>

  <text x="964" y="532" fill="#1F1B18" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Image drop</text>
  <text x="964" y="562" fill="#615D59" font-family="Segoe UI, Arial, sans-serif" font-size="15">Paste and drag-in keep a softer document feel.</text>
