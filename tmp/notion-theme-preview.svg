  <text x="1318" y="366" fill="#615D59" font-family="Segoe UI, Arial, sans-serif" font-size="16">Use quieter borders, less glass,</text>
  <text x="1318" y="392" fill="#615D59" font-family="Segoe UI, Arial, sans-serif" font-size="16">and a single blue highlight.</text>
  <text x="1318" y="418" fill="#615D59" font-family="Segoe UI, Arial, sans-serif" font-size="16">The app should feel like paper</text>
  <text x="1318" y="444" fill="#615D59" font-family="Segoe UI, Arial, sans-serif" font-size="16">not a glossy dashboard.</text>

