  <text x="964" y="863" fill="#615D59" font-family="Segoe UI, Arial, sans-serif" font-size="15">Lighter border and calmer metadata.</text>

  <text x="1292" y="92" fill="#1F1B18" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Quick Panel</text>
  <text x="1292" y="122" fill="#6A655F" font-family="Segoe UI, Arial, sans-serif" font-size="15">Details stay quiet and readable.</text>

