<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>{% block title %}灵感收集{% endblock %}</title>
    <style>
        :root {
            --bg: #f6efe6;
            --panel: rgba(255, 255, 255, 0.78);
            --text: #111827;
            --muted: #64748b;
            --line: rgba(15, 23, 42, 0.10);
            --accent: #f97316;
            --accent-strong: #ea580c;
            --danger: #dc2626;
            --shadow: 0 20px 48px rgba(15, 23, 42, 0.10);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei UI", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 12% 10%, rgba(249, 115, 22, 0.18), transparent 24%),
                radial-gradient(circle at 86% 12%, rgba(37, 99, 235, 0.12), transparent 26%),
                linear-gradient(180deg, #fff9f2 0%, #f6f7fb 40%, #eef2ff 100%);
        }

        a { color: inherit; text-decoration: none; }
        button, input, select, textarea { font: inherit; }

        .shell {
            max-width: 1460px;
            margin: 0 auto;
            padding: 18px 14px 36px;
        }

        .app-frame {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .sidebar {
            position: sticky;
            top: 16px;
            display: grid;
            gap: 14px;
            padding: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-mark {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            box-shadow: 0 12px 24px rgba(249, 115, 22, 0.24);
            flex-shrink: 0;
        }

        .brand h1 { margin: 0; font-size: 22px; letter-spacing: -0.02em; }
        .brand p { margin: 4px 0 0; color: var(--muted); line-height: 1.55; font-size: 13px; }

        .sidebar-title {
            margin: 0;
            font-size: 12px;
            font-weight: 800;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.20);
            font-size: 16px;
        }

        .sidebar-link.active {
            background: rgba(249, 115, 22, 0.12);
            border-color: rgba(249, 115, 22, 0.20);
            color: var(--accent-strong);
        }

        .sidebar-card {
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.74);
        }

        .sidebar-card strong {
            display: block;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .sidebar-note {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
            font-size: 13px;
        }

        main { min-width: 0; }

        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 8px 4px;
        }

        .page-title {
            margin: 0;
            font-size: 24px;
            letter-spacing: -0.01em;
        }

        .page-desc {
            margin: 4px 0 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .btn {
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.9);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            min-height: 40px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff;
            border-color: transparent;
        }

        .btn-danger {
            color: var(--danger);
            border-color: rgba(220, 38, 38, 0.18);
            background: rgba(220, 38, 38, 0.06);
        }

        .field,
        .select,
        .textarea {
            width: 100%;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            color: var(--text);
        }

        .field:focus,
        .select:focus,
        .textarea:focus {
            outline: none;
            border-color: rgba(249, 115, 22, 0.40);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.12);
        }

        .textarea {
            min-height: 120px;
            resize: vertical;
        }

        .field-group { display: grid; gap: 8px; }

        .field-group label {
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
        }

        @media (max-width: 1180px) {
            .app-frame { grid-template-columns: 1fr; }
            .sidebar { position: static; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="shell">
        <div class="app-frame">
            <aside class="panel sidebar">
                <div class="brand">
                    <div class="brand-mark">◎</div>
                    <div>
                        <h1>灵感收集</h1>
                        <p>把零散想法、链接、图片和视频，装进一个干净好用的本地工作台。</p>
                    </div>
                </div>
                <div>
                    <p class="sidebar-title">导航</p>
                    <a class="sidebar-link {% if request.endpoint == 'main.index' %}active{% endif %}" href="{{ url_for('main.index') }}">首页</a>
                </div>
                <div class="sidebar-card">
                    <strong>快速收集</strong>
                    <p class="sidebar-note">在页面任意位置直接粘贴，系统会弹出快速记录框并自动识别。</p>
                </div>
                {% block sidebar_extra %}{% endblock %}
            </aside>
            <main>
                <header class="topbar">
                    <div class="brand">
                        <div class="brand-mark">✦</div>
                        <div>
                            <h1 class="page-title">灵感收集</h1>
                            <p class="page-desc">一个本地运行的 Flask 小工具，用来收集、整理和跟踪那些一闪而过但值得留下来的东西。</p>
                        </div>
                    </div>
                </header>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
