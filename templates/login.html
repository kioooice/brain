{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<section class="panel" style="max-width: 460px; margin: 48px auto 0; padding: 24px;">
    <div style="display: grid; gap: 8px; margin-bottom: 18px;">
        <span style="display: inline-flex; width: fit-content; padding: 5px 10px; border-radius: 999px; background: rgba(249, 115, 22, 0.14); color: #ea580c; font-size: 12px; font-weight: 700;">发布模式</span>
        <h2 style="margin: 0; font-size: 24px;">输入访问密码</h2>
        <p style="margin: 0; color: var(--muted); line-height: 1.7;">这个实例已经开启最小访问保护。输入部署时配置的密码后才能继续使用。</p>
    </div>
    <form method="post" style="display: grid; gap: 14px;">
        <input type="hidden" name="next" value="{{ next_target }}">
        <div class="field-group">
            <label for="password">访问密码</label>
            <input id="password" class="field" type="password" name="password" autocomplete="current-password" required>
        </div>
        {% if error %}
        <p style="margin: 0; color: var(--danger);">{{ error }}</p>
        {% endif %}
        <button class="btn btn-primary" type="submit">进入工作台</button>
    </form>
</section>
{% endblock %}
